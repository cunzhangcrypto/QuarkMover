name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            pyinstaller_name: QuarkMover.exe
            package: exe        # 直接发可执行文件
          - os: macos-latest
            platform: macOS-Intel
            pyinstaller_name: QuarkMover
            package: zip        # 打包 zip 以保留可执行位，避免 macOS 用 TextEdit 打开
          - os: macos-14
            platform: macOS-ARM
            pyinstaller_name: QuarkMover
            package: zip
          - os: ubuntu-latest
            platform: Linux
            pyinstaller_name: QuarkMover
            package: tar.gz     # tar.gz 保留可执行位

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller quark_mover.spec

      - name: Package artifact (with version in filename)
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"      # e.g. v1.0.1
          BASE="QuarkMover-${{ matrix.platform }}-${VERSION}"
          cd dist
          case "${{ matrix.package }}" in
            exe)
              OUT="${BASE}.exe"
              mv "${{ matrix.pyinstaller_name }}" "${OUT}"
              ;;
            zip)
              chmod +x "${{ matrix.pyinstaller_name }}"
              # 重命名成带版本号的稳定文件名后再打包；zip -y 保留文件属性
              mv "${{ matrix.pyinstaller_name }}" "QuarkMover"
              OUT="${BASE}.zip"
              zip -y "${OUT}" QuarkMover
              ;;
            tar.gz)
              chmod +x "${{ matrix.pyinstaller_name }}"
              mv "${{ matrix.pyinstaller_name }}" "QuarkMover"
              OUT="${BASE}.tar.gz"
              tar -czf "${OUT}" QuarkMover
              ;;
          esac
          echo "artifact_name=${OUT}" >> "$GITHUB_OUTPUT"
          echo "artifact_path=dist/${OUT}" >> "$GITHUB_OUTPUT"
          ls -lh "${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact_name }}
          path: ${{ steps.pkg.outputs.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
