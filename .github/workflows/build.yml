name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: QuarkMover-Windows.exe
            pyinstaller_name: QuarkMover.exe
          - os: macos-latest
            artifact: QuarkMover-macOS-Intel
            pyinstaller_name: QuarkMover
          - os: macos-14
            artifact: QuarkMover-macOS-ARM
            pyinstaller_name: QuarkMover
          - os: ubuntu-latest
            artifact: QuarkMover-Linux
            pyinstaller_name: QuarkMover

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller quark_mover.spec

      - name: Rename artifact
        shell: bash
        run: |
          mv dist/${{ matrix.pyinstaller_name }} dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
